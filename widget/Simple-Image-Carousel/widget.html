<style>
  #purrform-simple-carousel-{{_.id}} {
    width: 100vw;
    max-width: 2560px;
    margin-left: calc(-50vw + 50%);
    margin-right: calc(-50vw + 50%);
  }

  #purrform-simple-carousel-{{_.id}} .slick-arrow {
    background-color: #39393d;
    height: 40px;
    width: 40px;
    border-radius: 99px;
    z-index: 10;
    top: 50%;
  }

  #purrform-simple-carousel-{{_.id}} .slick-arrow::before,
  #purrform-simple-carousel-{{_.id}} .slick-arrow::after {
    background-image: none;
    content: '';
    background-color: #fff;
    height: 15px;
    width: 4px;
    display: block;
    position: absolute;
    border-radius: 3px;
  }

  #purrform-simple-carousel-{{_.id}} .slick-arrow::before { top: 7px; font-size: 0; }
  #purrform-simple-carousel-{{_.id}} .slick-arrow::after  { top: 15px; }

  #purrform-simple-carousel-{{_.id}} .slick-prev { left: 20px; }
  #purrform-simple-carousel-{{_.id}} .slick-prev::before,
  #purrform-simple-carousel-{{_.id}} .slick-prev::after  { left: 16px; }
  #purrform-simple-carousel-{{_.id}} .slick-prev::before { transform: rotate(-130deg); }
  #purrform-simple-carousel-{{_.id}} .slick-prev::after  { transform: rotate(-50deg); }

  #purrform-simple-carousel-{{_.id}} .slick-next { right: 20px; }
  #purrform-simple-carousel-{{_.id}} .slick-next::before,
  #purrform-simple-carousel-{{_.id}} .slick-next::after  { left: 18px; }
  #purrform-simple-carousel-{{_.id}} .slick-next::before { transform: rotate(130deg); }
  #purrform-simple-carousel-{{_.id}} .slick-next::after  { transform: rotate(50deg); }
</style>

<div
  class="purrform-simple-carousel"
  id="purrform-simple-carousel-{{_.id}}"
  data-slick='{
    "dots": true,
    "arrows": true,
    "autoplay": true,
    "autoplaySpeed": {{autoplaySpeed}},
    "infinite": true,
    "slidesToShow": 1,
    "slidesToScroll": 1
  }'
>
  {{#each slides}}
    <div class="purrform-simple-carousel__slide">
      <a
        class="purrform-simple-carousel__link"
        href="{{linkUrl}}"
        aria-label="{{imageAlt}}"
      >
        <picture>
          {{#if desktopImage.src}}
            <source media="(min-width: 1251px)" srcset="{{desktopImage.src}}">
          {{/if}}
          {{#if tabletImage.src}}
            <source media="(min-width: 651px)" srcset="{{tabletImage.src}}">
          {{/if}}
          <img
            class="purrform-simple-carousel__img lazyload"
            data-src="{{#if mobileImage.src}}{{mobileImage.src}}{{else if tabletImage.src}}{{tabletImage.src}}{{else}}{{desktopImage.src}}{{/if}}"
            alt="{{imageAlt}}"
          >
        </picture>
      </a>
    </div>
  {{/each}}
</div>

<script>
  (function () {
    // Slick is initialised globally by the theme on [data-slick] at page load.
    // When this widget is injected live by Page Builder (after DOMContentLoaded),
    // we re-init slick on just this instance so it activates immediately.
    var el = document.getElementById('purrform-simple-carousel-{{_.id}}');
    if (el && typeof jQuery !== 'undefined' && typeof jQuery.fn.slick !== 'undefined') {
      var $el = jQuery(el);
      if (!$el.hasClass('slick-initialized')) {
        $el.slick();
      }
    }
  })();
</script>
